services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hs-data-api:local
    container_name: hs-data-api
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      HS_API_BIND_HOST: "0.0.0.0"
      HS_API_PORT: "8000"
      HS_FLARESOLVERR_URL: "http://flaresolverr:8191/v1"
      HS_CLOAKBROWSER_DISPLAY: ":99"
      DISPLAY: ":99"
    volumes:
      - ./data:/var/lib/hs-data-api
    ports:
      - "127.0.0.1:18081:8000"
    depends_on:
      flaresolverr:
        condition: service_started
    shm_size: "4gb"
    mem_limit: "12g"
    cpus: 6

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: hs-flaresolverr-docker
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      CAPTCHA_SOLVER: none
      TZ: Europe/Warsaw
    shm_size: "4gb"
    mem_limit: "6g"
    cpus: 4
