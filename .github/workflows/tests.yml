name: tests

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  host-exporter-python311:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install "pytest>=9,<10"
      - run: python -c "from app.systemd_timer_export import build_host_timer_snapshot, write_host_timer_snapshot"
      - run: python -m pytest -q tests/test_parser_control_systemd_runtime.py tests/test_parser_control_schedule_inventory.py

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: docker build --no-cache --tag hs-data-api:ci .
