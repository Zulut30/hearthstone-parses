name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx curl-cffi
      - run: python -m unittest discover -s tests -p 'test_*.py' -q
